<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#202124" />
    <title>MailX Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Roboto, Inter, system-ui, sans-serif;
        background: #202124;
        color: #e8eaed;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 360px;
        text-align: center;
      }

      .mark {
        width: 96px;
        height: 96px;
        margin: 0 auto 28px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: #303134;
        box-shadow: 0 8px 28px rgb(0 0 0 / 0.32);
      }

      img {
        width: 64px;
        height: 64px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 36px;
        font-weight: 400;
      }

      p {
        margin: 12px 0 28px;
        color: #bdc1c6;
        line-height: 24px;
      }

      button {
        height: 44px;
        border: 0;
        border-radius: 999px;
        padding: 0 24px;
        background: #a8c7fa;
        color: #062e6f;
        font: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">
        <img src="/favicon.svg" alt="" />
      </div>
      <h1>No Internet</h1>
      <p>MailX can still open recently viewed mail. Reconnect to sync the latest messages.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
